<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ContentBase | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body style="display: flex; flex-direction: column; min-height: 100vh;">

    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo-text">AI ContentBase</a>
        </div>
        <div class="nav-right">
            <select class="lang-switch" style="margin-right: 12px;">
                <option value="en">EN</option>
                <option value="th">TH</option>
            </select>
            <a href="index.html" style="font-size: 0.9rem; font-weight: 500; color: var(--text-muted);"
                data-i18n="nav_home">Back to Home</a>
        </div>
    </nav>

    <main style="flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px;">
        <div class="card" style="width: 100%; max-width: 450px; padding: 40px;">
            <div style="text-align: center; margin-bottom: 30px;">
                <h2 style="font-size: 1.5rem; font-weight: 700; margin-bottom: 8px;" data-i18n="reg_title">Create an
                    Account</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem;" data-i18n="reg_desc">Join AI ContentBase to
                    unlock premium tools and courses</p>
            </div>

            <form id="registerForm">
                <div style="margin-bottom: 20px; display: grid; grid-template-columns: 1fr 1fr; gap: 16px;">
                    <div>
                        <label
                            style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text-muted);"
                            data-i18n="reg_fname">First Name</label>
                        <input type="text" placeholder="John"
                            style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-size: 0.9rem; outline: none; transition: border-color 0.2s;"
                            required>
                    </div>
                    <div>
                        <label
                            style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text-muted);"
                            data-i18n="reg_lname">Last Name</label>
                        <input type="text" placeholder="Doe"
                            style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-size: 0.9rem; outline: none; transition: border-color 0.2s;"
                            required>
                    </div>
                </div>

                <div style="margin-bottom: 20px;">
                    <label
                        style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text-muted);"
                        data-i18n="reg_email">Email Address</label>
                    <input type="email" placeholder="name@example.com"
                        style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-size: 0.9rem; outline: none; transition: border-color 0.2s;"
                        required>
                </div>

                <div style="margin-bottom: 24px;">
                    <label
                        style="display: block; font-size: 0.85rem; font-weight: 500; margin-bottom: 8px; color: var(--text-muted);"
                        data-i18n="reg_password">Password</label>
                    <input type="password" placeholder="••••••••"
                        style="width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid var(--border); background: var(--surface-light); color: white; font-size: 0.9rem; outline: none; transition: border-color 0.2s;"
                        required>
                </div>

                <button type="submit" class="btn-primary"
                    style="width: 100%; padding: 12px; font-size: 1rem; border-radius: 8px; margin-bottom: 20px;"
                    data-i18n="reg_btn_submit">Sign Up</button>

                <div style="text-align: center; color: var(--text-muted); font-size: 0.85rem; position: relative;">
                    <span style="background: var(--surface); padding: 0 10px; position: relative; z-index: 1;"
                        data-i18n="reg_or">Or register with</span>
                    <hr
                        style="position: absolute; top: 50%; width: 100%; border: none; border-top: 1px solid var(--border); margin: 0; z-index: 0;">
                </div>

                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px;">
                    <button type="button" class="btn-outline"
                        style="padding: 10px; border-radius: 8px; font-weight: 500; font-size: 0.9rem;"><i
                            class="fa-brands fa-google"></i> Google</button>
                    <button type="button" class="btn-outline"
                        style="padding: 10px; border-radius: 8px; font-weight: 500; font-size: 0.9rem;"><i
                            class="fa-brands fa-github"></i> GitHub</button>
                </div>
            </form>

            <p style="text-align: center; margin-top: 30px; font-size: 0.9rem; color: var(--text-muted);">
                <span data-i18n="reg_already">Already have an account?</span> <a href="login.html"
                    style="color: white; font-weight: 500;" data-i18n="reg_login_link">Sign in</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            alert('Registration Successful! Redirecting to login...');
            window.location.href = 'login.html';
        });
    </script>
</body>

</html>
