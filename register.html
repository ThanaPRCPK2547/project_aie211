<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI ContentBase | Register</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>

<body style="display:flex;flex-direction:column;min-height:100vh;">

    <!-- Toast Container -->
    <div class="toast-container" id="toastContainer"></div>

    <nav>
        <div class="nav-left">
            <a href="index.html" class="logo-text">AI ContentBase</a>
        </div>
        <div class="nav-right">
            <select class="lang-switch" style="margin-right:12px;">
                <option value="en">EN</option>
                <option value="th">TH</option>
            </select>
            <a href="index.html" style="font-size:0.9rem;font-weight:500;color:var(--text-muted);" data-i18n="nav_home">Back to Home</a>
        </div>
    </nav>

    <main style="flex:1;display:flex;align-items:center;justify-content:center;padding:40px 20px;">
        <div class="card" style="width:100%;max-width:450px;padding:40px;">
            <div style="text-align:center;margin-bottom:30px;">
                <h2 style="font-size:1.5rem;font-weight:700;margin-bottom:8px;" data-i18n="reg_title">Create an Account</h2>
                <p style="color:var(--text-muted);font-size:0.9rem;" data-i18n="reg_desc">Join AI ContentBase to unlock premium tools and courses</p>
            </div>

            <form id="registerForm" novalidate>
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:0;">
                    <div class="form-field">
                        <label style="display:block;font-size:0.85rem;font-weight:500;margin-bottom:8px;color:var(--text-muted);" data-i18n="reg_fname">First Name</label>
                        <input type="text" id="regFname" placeholder="John" autocomplete="given-name">
                        <div class="field-error" id="fnameError">Required.</div>
                    </div>
                    <div class="form-field">
                        <label style="display:block;font-size:0.85rem;font-weight:500;margin-bottom:8px;color:var(--text-muted);" data-i18n="reg_lname">Last Name</label>
                        <input type="text" id="regLname" placeholder="Doe" autocomplete="family-name">
                        <div class="field-error" id="lnameError">Required.</div>
                    </div>
                </div>

                <div class="form-field">
                    <label style="display:block;font-size:0.85rem;font-weight:500;margin-bottom:8px;color:var(--text-muted);" data-i18n="reg_email">Email Address</label>
                    <input type="email" id="regEmail" placeholder="name@example.com" autocomplete="email">
                    <div class="field-error" id="regEmailError">Please enter a valid email address.</div>
                </div>

                <div class="form-field" style="margin-bottom:24px;">
                    <label style="display:block;font-size:0.85rem;font-weight:500;margin-bottom:8px;color:var(--text-muted);" data-i18n="reg_password">Password</label>
                    <div class="pw-wrap">
                        <input type="password" id="regPassword" placeholder="Min. 8 characters" autocomplete="new-password">
                        <button type="button" class="pw-toggle" id="pwToggleReg"><i class="fa-regular fa-eye"></i></button>
                    </div>
                    <div class="field-error" id="regPasswordError">Password must be at least 8 characters.</div>
                    <!-- Password strength -->
                    <div id="pwStrengthBar" style="display:none;margin-top:8px;">
                        <div style="height:4px;border-radius:4px;background:var(--border);overflow:hidden;">
                            <div id="pwStrengthFill" style="height:100%;width:0%;border-radius:4px;transition:width 0.3s,background 0.3s;"></div>
                        </div>
                        <div id="pwStrengthLabel" style="font-size:0.75rem;color:var(--text-muted);margin-top:4px;"></div>
                    </div>
                </div>

                <button type="submit" class="btn-primary" style="width:100%;padding:12px;font-size:1rem;border-radius:8px;margin-bottom:20px;" data-i18n="reg_btn_submit">Sign Up</button>

                <div style="text-align:center;color:var(--text-muted);font-size:0.85rem;position:relative;">
                    <span style="background:var(--surface);padding:0 10px;position:relative;z-index:1;" data-i18n="reg_or">Or register with</span>
                    <hr style="position:absolute;top:50%;width:100%;border:none;border-top:1px solid var(--border);margin:0;z-index:0;">
                </div>

                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:20px;">
                    <button type="button" class="btn-outline" style="padding:10px;border-radius:8px;font-weight:500;font-size:0.9rem;"><i class="fa-brands fa-google"></i> Google</button>
                    <button type="button" class="btn-outline" style="padding:10px;border-radius:8px;font-weight:500;font-size:0.9rem;"><i class="fa-brands fa-github"></i> GitHub</button>
                </div>
            </form>

            <p style="text-align:center;margin-top:30px;font-size:0.9rem;color:var(--text-muted);">
                <span data-i18n="reg_already">Already have an account?</span>
                <a href="login.html" style="color:white;font-weight:500;" data-i18n="reg_login_link"> Sign in</a>
            </p>
        </div>
    </main>

    <script src="script.js"></script>
    <script>
        // Password toggle
        document.getElementById('pwToggleReg').addEventListener('click', function () {
            const input = document.getElementById('regPassword');
            const icon = this.querySelector('i');
            if (input.type === 'password') {
                input.type = 'text';
                icon.className = 'fa-regular fa-eye-slash';
            } else {
                input.type = 'password';
                icon.className = 'fa-regular fa-eye';
            }
        });

        // Password strength meter
        document.getElementById('regPassword').addEventListener('input', function () {
            const val = this.value;
            const bar = document.getElementById('pwStrengthBar');
            const fill = document.getElementById('pwStrengthFill');
            const label = document.getElementById('pwStrengthLabel');
            if (!val) { bar.style.display = 'none'; return; }
            bar.style.display = 'block';
            let score = 0;
            if (val.length >= 8) score++;
            if (/[A-Z]/.test(val)) score++;
            if (/[0-9]/.test(val)) score++;
            if (/[^A-Za-z0-9]/.test(val)) score++;
            const levels = [
                { pct: '25%', color: '#ef4444', text: 'Weak' },
                { pct: '50%', color: '#f97316', text: 'Fair' },
                { pct: '75%', color: '#eab308', text: 'Good' },
                { pct: '100%', color: '#22c55e', text: 'Strong' },
            ];
            const lvl = levels[score - 1] || levels[0];
            fill.style.width = lvl.pct;
            fill.style.background = lvl.color;
            label.textContent = lvl.text;
            label.style.color = lvl.color;
        });

        // Clear error on focus
        document.querySelectorAll('.form-field input').forEach(input => {
            input.addEventListener('focus', () => input.classList.remove('input-error', 'input-success'));
        });

        function validateField(inputId, errorId, condition) {
            const input = document.getElementById(inputId);
            const error = document.getElementById(errorId);
            if (!condition(input.value)) {
                input.classList.add('input-error');
                error.classList.add('visible');
                return false;
            }
            input.classList.remove('input-error');
            input.classList.add('input-success');
            error.classList.remove('visible');
            return true;
        }

        document.getElementById('registerForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const v1 = validateField('regFname', 'fnameError', v => v.trim().length > 0);
            const v2 = validateField('regLname', 'lnameError', v => v.trim().length > 0);
            const v3 = validateField('regEmail', 'regEmailError', v => /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v.trim()));
            const v4 = validateField('regPassword', 'regPasswordError', v => v.length >= 8);
            if (!v1 || !v2 || !v3 || !v4) return;

            showToast('Account created!', 'Redirecting to login...', 'success');
            setTimeout(() => { window.location.href = 'login.html'; }, 1500);
        });
    </script>
</body>

</html>
